<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>Lumi — Bago 老師的 AI 顧問</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --brand-900: #1A2A7A;
    --brand-700: #2B44B0;
    --brand-500: #3B5BDB;
    --brand-100: #EEF1FC;
    --accent-500: #D99A2B;
    --accent-400: #E8A838;
    --accent-100: #FDF6E7;
    --ink-900: #0F1115;
    --ink-700: #2A2D35;
    --ink-500: #5A5F6B;
    --ink-400: #8A8F9B;
    --ink-300: #C7CAD1;
    --ink-200: #E4E6EC;
    --ink-100: #F2F4F8;
    --bg: #F7F8FB;
    --surface: #FFFFFF;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 24px;
    --shadow-sm: 0 1px 2px rgba(16, 24, 64, 0.04), 0 1px 3px rgba(16, 24, 64, 0.05);
    --shadow-md: 0 4px 14px rgba(16, 24, 64, 0.08);
    --shadow-brand: 0 6px 20px rgba(43, 68, 176, 0.28);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--ink-900);
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    letter-spacing: 0.01em;
  }

  /* ===== Header ===== */
  header {
    position: relative;
    background:
      radial-gradient(1200px 200px at 85% -30%, rgba(232, 168, 56, 0.22), transparent 60%),
      linear-gradient(135deg, #243391 0%, #2B44B0 55%, #3B5BDB 100%);
    color: #fff;
    padding: 18px 20px 16px;
    flex-shrink: 0;
    box-shadow: 0 6px 20px rgba(16, 24, 64, 0.12);
    padding-top: calc(18px + env(safe-area-inset-top));
    transition: padding 0.25s ease;
  }
  body.keyboard-open header { padding: 8px 20px 8px; padding-top: calc(8px + env(safe-area-inset-top)); }
  body.keyboard-open .brand-mark { width: 28px; height: 28px; font-size: 13px; border-radius: 8px; }
  body.keyboard-open .brand-sub { display: none; }
  body.keyboard-open #progress-wrap { margin-top: 6px; }
  body.keyboard-open header::after { display: none; }
  header::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 18px 18px;
    opacity: 0.5;
    pointer-events: none;
  }
  .header-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, #F5C15A 0%, #D99A2B 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #1A2A7A;
    box-shadow: 0 4px 14px rgba(217, 154, 43, 0.35), inset 0 1px 0 rgba(255,255,255,0.4);
    flex-shrink: 0;
    letter-spacing: -0.02em;
  }
  .brand-text {
    flex: 1;
    min-width: 0;
  }
  .brand-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-title .divider {
    width: 1px;
    height: 12px;
    background: rgba(255,255,255,0.35);
    display: inline-block;
  }
  .brand-title .sub {
    font-weight: 500;
    font-size: 13px;
    opacity: 0.82;
  }
  .brand-sub {
    font-size: 11.5px;
    opacity: 0.75;
    margin-top: 3px;
    letter-spacing: 0.04em;
  }
  .brand-sub .dot {
    display: inline-block;
    width: 3px;
    height: 3px;
    background: var(--accent-400);
    border-radius: 50%;
    margin: 0 6px;
    vertical-align: middle;
  }

  #progress-wrap {
    position: relative;
    z-index: 1;
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #progress {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.16);
    border-radius: 999px;
    overflow: hidden;
    backdrop-filter: blur(4px);
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #F5C15A 0%, #E8A838 50%, #D99A2B 100%);
    width: 0%;
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 0 10px rgba(232, 168, 56, 0.5);
  }
  #progress-label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  /* ===== Chat ===== */
  #chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 0; }

  .msg {
    max-width: 85%;
    padding: 12px 16px;
    font-size: 15px;
    line-height: 1.65;
    word-wrap: break-word;
    overflow-wrap: break-word;
    animation: fadeIn 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    letter-spacing: 0.015em;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #3B5BDB 0%, #2B44B0 100%);
    color: #fff;
    border-radius: 18px 18px 4px 18px;
    box-shadow: var(--shadow-brand);
    font-weight: 500;
  }

  .msg.ai {
    align-self: flex-start;
    background: var(--surface);
    color: var(--ink-900);
    border: 1px solid var(--ink-200);
    border-radius: 4px 18px 18px 18px;
    box-shadow: var(--shadow-sm);
    position: relative;
    padding-left: 16px;
  }
  .msg.ai::before {
    content: "";
    position: absolute;
    left: 0;
    top: 12px;
    bottom: 12px;
    width: 3px;
    background: linear-gradient(180deg, var(--brand-500), var(--accent-400));
    border-radius: 0 3px 3px 0;
    opacity: 0.75;
  }

  /* Report markdown inside AI bubble */
  .msg.ai p { margin: 0 0 10px; }
  .msg.ai p:last-child { margin-bottom: 0; }
  .msg.ai strong { font-weight: 700; color: var(--brand-700); }
  .msg.ai em { color: var(--ink-700); font-style: normal; background: var(--accent-100); padding: 0 4px; border-radius: 3px; }
  .msg.ai h1 {
    font-size: 18px;
    font-weight: 700;
    margin: 14px 0 10px;
    color: var(--brand-900);
    letter-spacing: 0.01em;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--brand-100);
  }
  .msg.ai h1:first-child { margin-top: 0; }
  .msg.ai h2 {
    font-size: 16px;
    font-weight: 700;
    margin: 16px 0 8px;
    color: var(--brand-700);
    letter-spacing: 0.01em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .msg.ai h2::before {
    content: "";
    width: 4px;
    height: 16px;
    background: linear-gradient(180deg, var(--brand-500), var(--accent-400));
    border-radius: 2px;
  }
  .msg.ai h2:first-child { margin-top: 0; }
  .msg.ai h3 {
    font-size: 14.5px;
    font-weight: 700;
    margin: 12px 0 6px;
    color: var(--ink-900);
  }
  .msg.ai h3:first-child { margin-top: 0; }
  .msg.ai ul, .msg.ai ol {
    padding-left: 20px;
    margin: 8px 0 10px;
  }
  .msg.ai li {
    margin-bottom: 6px;
    line-height: 1.65;
  }
  .msg.ai li::marker { color: var(--brand-500); font-weight: 700; }
  .msg.ai a {
    color: var(--brand-700);
    text-decoration: none;
    font-weight: 600;
    border-bottom: 1.5px solid var(--brand-100);
    padding-bottom: 1px;
    transition: border-color 0.2s;
  }
  .msg.ai a:hover, .msg.ai a:active { border-bottom-color: var(--brand-500); }
  .msg.ai code {
    background: var(--ink-100);
    color: var(--brand-700);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
    font-size: 13px;
    font-weight: 500;
  }
  .msg.ai pre {
    background: var(--ink-100);
    border: 1px solid var(--ink-200);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    overflow-x: auto;
    margin: 10px 0;
    font-size: 13px;
    line-height: 1.55;
  }
  .msg.ai pre code {
    background: transparent;
    padding: 0;
    color: var(--ink-900);
  }
  .msg.ai blockquote {
    border-left: 3px solid var(--accent-400);
    background: var(--accent-100);
    padding: 8px 14px;
    margin: 10px 0;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--ink-700);
    font-size: 14px;
  }
  .msg.ai blockquote p:last-child { margin-bottom: 0; }
  .msg.ai hr {
    border: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--ink-200), transparent);
    margin: 14px 0;
  }
  .msg.ai table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 13.5px;
  }
  .msg.ai th, .msg.ai td {
    padding: 8px 10px;
    border: 1px solid var(--ink-200);
    text-align: left;
  }
  .msg.ai th {
    background: var(--brand-100);
    color: var(--brand-900);
    font-weight: 600;
  }

  .msg.system {
    align-self: center;
    background: rgba(42, 45, 53, 0.06);
    color: var(--ink-500);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 999px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .report-done {
    align-self: center;
    background: linear-gradient(135deg, #F5C15A 0%, #D99A2B 100%);
    color: #fff;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    margin: 12px 0 4px;
    box-shadow: 0 6px 16px rgba(217, 154, 43, 0.35);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .report-done::before {
    content: "";
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-500);
    font-size: 10px;
    font-weight: 900;
    line-height: 14px;
    text-align: center;
  }

  /* ===== Typing ===== */
  .typing {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--ink-200);
    border-radius: 4px 18px 18px 18px;
    padding: 14px 18px;
    margin: 0 16px;
    display: none;
    box-shadow: var(--shadow-sm);
  }
  .typing.show { display: flex; gap: 5px; align-items: center; }
  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--brand-500);
    animation: bounce 1.3s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%, 70%, 100% { transform: translateY(0) scale(0.85); opacity: 0.4; }
    35% { transform: translateY(-6px) scale(1); opacity: 1; }
  }

  /* ===== Input ===== */
  #input-area {
    display: flex;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border-top: 1px solid var(--ink-200);
    flex-shrink: 0;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    align-items: flex-end;
  }
  #input {
    flex: 1;
    padding: 12px 16px;
    border: 1.5px solid var(--ink-200);
    border-radius: 22px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    background: var(--ink-100);
    color: var(--ink-900);
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    line-height: 1.4;
    -webkit-appearance: none;
    letter-spacing: 0.015em;
  }
  #input::placeholder { color: var(--ink-400); }
  #input:focus {
    border-color: var(--brand-500);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(59, 91, 219, 0.12);
  }
  #input:disabled { opacity: 0.6; }

  #send-btn {
    background: linear-gradient(135deg, #3B5BDB 0%, #2B44B0 100%);
    color: #fff;
    border: 0;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: var(--shadow-brand);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    position: relative;
  }
  #send-btn::after {
    content: "";
    width: 18px;
    height: 18px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'><path d='M5 12l14 0'/><path d='M13 6l6 6-6 6'/></svg>");
    background-size: contain;
    background-repeat: no-repeat;
  }
  #send-btn:active:not(:disabled) {
    transform: scale(0.94);
    box-shadow: 0 2px 8px rgba(43, 68, 176, 0.35);
  }
  #send-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* ===== Fallback Panel ===== */
  #fallback-panel {
    display: none;
    padding: 32px 24px;
    max-width: 420px;
    margin: auto;
    text-align: center;
  }
  #fallback-panel.show { display: block; }
  #fallback-panel h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--ink-900);
  }
  #fallback-panel p {
    color: var(--ink-500);
    font-size: 14px;
    line-height: 1.55;
  }
  #fallback-panel input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--ink-200);
    border-radius: var(--radius-sm);
    margin: 10px 0 0;
    font-size: 15px;
    font-family: inherit;
    background: var(--surface);
    outline: none;
    transition: border-color 0.2s;
  }
  #fallback-panel input:focus { border-color: var(--brand-500); }
  #fallback-panel button {
    width: 100%;
    padding: 13px;
    margin-top: 14px;
    background: linear-gradient(135deg, #3B5BDB 0%, #2B44B0 100%);
    color: #fff;
    border: 0;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: var(--shadow-brand);
    letter-spacing: 0.02em;
  }
  #fallback-panel .hint {
    font-size: 12.5px;
    color: var(--ink-400);
    margin-top: 12px;
    line-height: 1.5;
  }

  /* ===== Small screen adjustments ===== */
  @media (max-width: 360px) {
    .msg { font-size: 14.5px; max-width: 88%; }
    .brand-title { font-size: 15px; }
    .brand-title .sub { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand-mark" aria-hidden="true">Lu</div>
    <div class="brand-text">
      <div class="brand-title">
        Lumi
        <span class="divider"></span>
        <span class="sub">Bago 老師的 AI 顧問</span>
      </div>
      <div class="brand-sub">造局 AI<span class="dot"></span>7 題問完，你會知道你的下一步</div>
    </div>
  </div>
  <div id="progress-wrap">
    <div id="progress"><div id="progress-bar"></div></div>
    <div id="progress-label">0 / 7</div>
  </div>
</header>

<div id="fallback-panel">
  <h2>Dev 模式</h2>
  <p>沒從 LINE 開啟，請手動輸入 LINE User ID（dev 測試用）</p>
  <input id="fallback-userid" placeholder="Uxxxxxxxxxxxxxxxxx">
  <input id="fallback-name" placeholder="顯示名稱（選填）">
  <button onclick="startWithFallback()">開始對話</button>
  <div class="hint">正式部署時從 LIFF 進入會自動帶入 LINE userId</div>
</div>

<div id="chat-container" style="display:none;">
  <div id="messages"></div>
  <div class="typing" id="typing"><span></span><span></span><span></span></div>
  <form id="input-area" onsubmit="sendMessage(event)">
    <input id="input" placeholder="跟 Lumi 說說你的想法..." autocomplete="off" disabled>
    <button id="send-btn" type="submit" disabled aria-label="送出"></button>
  </form>
</div>

<script>
// LIFF_ID can be injected by server via {{LIFF_ID}} template, or read from query string
const LIFF_ID = '{{LIFF_ID}}' || new URLSearchParams(location.search).get('liffId') || '';

let sessionId = null;
let lineUserId = null;
let displayName = null;
let reportShown = false;

const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const progressBar = document.getElementById('progress-bar');
const progressLabel = document.getElementById('progress-label');

// Mobile keyboard: collapse header when focused so more room for messages; scroll to bottom
function onKbOpen() {
  document.body.classList.add('keyboard-open');
  setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 100);
}
function onKbClose() { document.body.classList.remove('keyboard-open'); }
inputEl.addEventListener('focus', onKbOpen);
inputEl.addEventListener('blur', onKbClose);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function addMsg(role, text, opts = {}) {
  if (role === 'system') {
    const el = document.createElement('div');
    el.className = 'msg system';
    el.textContent = text;
    messagesEl.appendChild(el);
  } else if (role === 'report-done') {
    const el = document.createElement('div');
    el.className = 'report-done';
    el.textContent = text;
    messagesEl.appendChild(el);
  } else {
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    if (role === 'ai') {
      el.innerHTML = marked.parse(text);
    } else {
      el.textContent = text;
    }
    messagesEl.appendChild(el);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setTyping(on) {
  typingEl.classList.toggle('show', on);
  if (on) messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setProgress(currentQuestion) {
  const answered = Math.max(0, Math.min(7, currentQuestion - 1));
  const pct = (answered / 7) * 100;
  progressBar.style.width = pct + '%';
  if (progressLabel) progressLabel.textContent = answered + ' / 7';
}

async function initLiff() {
  if (!LIFF_ID || LIFF_ID === '{{' + 'LIFF_ID}}') {
    console.log('No LIFF_ID configured, using fallback');
    showFallback();
    return;
  }
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    const profile = await liff.getProfile();
    lineUserId = profile.userId;
    displayName = profile.displayName;
    await startSession();
  } catch (e) {
    console.error('LIFF init failed:', e);
    showFallback();
  }
}

function showFallback() {
  document.getElementById('fallback-panel').classList.add('show');
  document.getElementById('chat-container').style.display = 'none';
}

async function startWithFallback() {
  const uid = document.getElementById('fallback-userid').value.trim();
  const name = document.getElementById('fallback-name').value.trim() || 'dev-user';
  if (!uid) { alert('請輸入 LINE User ID'); return; }
  lineUserId = uid;
  displayName = name;
  document.getElementById('fallback-panel').classList.remove('show');
  document.getElementById('chat-container').style.display = 'flex';
  await startSession();
}

async function startSession() {
  document.getElementById('chat-container').style.display = 'flex';
  try {
    const resp = await fetch('/api/lumi/session/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lineUserId, displayName }),
    });
    const data = await resp.json();
    if (!data.sessionId) throw new Error(data.error || 'session start failed');
    sessionId = data.sessionId;
    inputEl.disabled = false;
    sendBtn.disabled = false;
    setProgress(data.currentQuestion || 1);

    // Show intro + restore history if any
    if (data.history && data.history.length > 0) {
      data.history.forEach(m => addMsg(m.role === 'user' ? 'user' : 'ai', m.content));
    } else {
      addMsg('ai', `嗨 ${displayName || '你'}～我是 Lumi，Bago 老師的 AI 顧問。\n\n7 題問完，你會知道你的下一步。\n\n**第 1 題**：你的目標是什麼？理想中的樣子長什麼樣？`);
    }
    inputEl.focus();
  } catch (e) {
    console.error(e);
    addMsg('system', '連線失敗：' + e.message);
  }
}

async function sendMessage(ev) {
  ev.preventDefault();
  const text = inputEl.value.trim();
  if (!text || !sessionId) return;
  addMsg('user', text);
  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.disabled = true;
  setTyping(true);

  try {
    const resp = await fetch('/api/lumi/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, text }),
    });
    const data = await resp.json();
    setTyping(false);

    if (data.error) {
      addMsg('system', '出錯了：' + data.error);
    } else {
      if (data.reply) addMsg('ai', data.reply);
      if (data.currentQuestion) setProgress(data.currentQuestion);
      if (data.reportGenerated && !reportShown) {
        reportShown = true;
        if (data.reportUrl) {
          addMsg('report-done', '報告已生成，也會傳到你的 LINE');
          addMsg('ai', `完整報告：[點我看報告](${data.reportUrl})`);
        } else {
          addMsg('report-done', '報告已生成');
        }
      }
    }
  } catch (e) {
    setTyping(false);
    addMsg('system', '網路錯誤：' + e.message);
  } finally {
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// Boot
initLiff();
</script>
