<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lumi — Bago 老師的 AI 顧問</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif;
    background: #f5f5f7;
    color: #1c1c1e;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    background: linear-gradient(135deg, #3B5BDB, #2B44B0);
    color: #fff;
    padding: 16px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    flex-shrink: 0;
  }
  header h1 { font-size: 17px; font-weight: 700; }
  header .subtitle { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  #progress {
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: #E8A838;
    width: 0%;
    transition: width 0.4s ease;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user {
    align-self: flex-end;
    background: #3B5BDB;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.ai {
    align-self: flex-start;
    background: #fff;
    color: #1c1c1e;
    border: 1px solid #e5e5ea;
    border-bottom-left-radius: 4px;
  }
  .msg.ai p { margin: 0 0 6px; }
  .msg.ai p:last-child { margin-bottom: 0; }
  .msg.ai strong { font-weight: 700; }
  .msg.ai h2, .msg.ai h3 { font-size: 15px; font-weight: 700; margin: 8px 0 4px; }
  .msg.ai ul, .msg.ai ol { padding-left: 18px; margin: 4px 0; }
  .msg.system {
    align-self: center;
    background: rgba(0,0,0,0.06);
    color: #666;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 10px;
  }
  .typing {
    align-self: flex-start;
    background: #fff;
    border: 1px solid #e5e5ea;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: none;
  }
  .typing.show { display: flex; gap: 4px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: #999;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
  #input-area {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: #fff;
    border-top: 1px solid #e5e5ea;
    flex-shrink: 0;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  #input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #d1d1d6;
    border-radius: 20px;
    font-size: 15px;
    outline: none;
    background: #f5f5f7;
  }
  #input:focus { border-color: #3B5BDB; background: #fff; }
  #send-btn {
    background: #3B5BDB;
    color: #fff;
    border: 0;
    border-radius: 50%;
    width: 42px; height: 42px;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #fallback-panel {
    display: none;
    padding: 24px;
    max-width: 400px;
    margin: auto;
    text-align: center;
  }
  #fallback-panel.show { display: block; }
  #fallback-panel input {
    width: 100%;
    padding: 12px;
    border: 1px solid #d1d1d6;
    border-radius: 8px;
    margin: 12px 0;
    font-size: 15px;
  }
  #fallback-panel button {
    width: 100%;
    padding: 12px;
    background: #3B5BDB;
    color: #fff;
    border: 0;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  #fallback-panel .hint { font-size: 13px; color: #666; margin-top: 8px; }
  .report-done {
    align-self: center;
    background: #E8A838;
    color: #fff;
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin: 8px 0;
  }
</style>
</head>
<body>

<header>
  <h1>Lumi｜Bago 老師的 AI 顧問</h1>
  <div class="subtitle">造局 AI · 7 題陪你看見盲點</div>
  <div id="progress"><div id="progress-bar"></div></div>
</header>

<div id="fallback-panel">
  <h2 style="font-size:18px;margin-bottom:8px;">Dev 模式</h2>
  <p style="color:#666;font-size:14px;">沒從 LINE 開啟，請手動輸入 LINE User ID（dev 測試用）</p>
  <input id="fallback-userid" placeholder="Uxxxxxxxxxxxxxxxxx">
  <input id="fallback-name" placeholder="顯示名稱（選填）">
  <button onclick="startWithFallback()">開始對話</button>
  <div class="hint">正式部署時從 LIFF 進入會自動帶入 LINE userId</div>
</div>

<div id="chat-container" style="display:none;flex:1;display:flex;flex-direction:column;min-height:0;">
  <div id="messages"></div>
  <div class="typing" id="typing"><span></span><span></span><span></span></div>
  <form id="input-area" onsubmit="sendMessage(event)">
    <input id="input" placeholder="跟 Lumi 說說你的想法..." autocomplete="off" disabled>
    <button id="send-btn" type="submit" disabled>→</button>
  </form>
</div>

<script>
// LIFF_ID can be injected by server via {{LIFF_ID}} template, or read from query string
const LIFF_ID = '{{LIFF_ID}}' || new URLSearchParams(location.search).get('liffId') || '';

let sessionId = null;
let lineUserId = null;
let displayName = null;
let reportShown = false;

const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const progressBar = document.getElementById('progress-bar');

function addMsg(role, text, opts = {}) {
  if (role === 'system') {
    const el = document.createElement('div');
    el.className = 'msg system';
    el.textContent = text;
    messagesEl.appendChild(el);
  } else if (role === 'report-done') {
    const el = document.createElement('div');
    el.className = 'report-done';
    el.textContent = text;
    messagesEl.appendChild(el);
  } else {
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    if (role === 'ai') {
      el.innerHTML = marked.parse(text);
    } else {
      el.textContent = text;
    }
    messagesEl.appendChild(el);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setTyping(on) {
  typingEl.classList.toggle('show', on);
  if (on) messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setProgress(currentQuestion) {
  const pct = Math.min(100, ((currentQuestion - 1) / 7) * 100);
  progressBar.style.width = pct + '%';
}

async function initLiff() {
  if (!LIFF_ID || LIFF_ID === '{{' + 'LIFF_ID}}') {
    console.log('No LIFF_ID configured, using fallback');
    showFallback();
    return;
  }
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    const profile = await liff.getProfile();
    lineUserId = profile.userId;
    displayName = profile.displayName;
    await startSession();
  } catch (e) {
    console.error('LIFF init failed:', e);
    showFallback();
  }
}

function showFallback() {
  document.getElementById('fallback-panel').classList.add('show');
  document.getElementById('chat-container').style.display = 'none';
}

async function startWithFallback() {
  const uid = document.getElementById('fallback-userid').value.trim();
  const name = document.getElementById('fallback-name').value.trim() || 'dev-user';
  if (!uid) { alert('請輸入 LINE User ID'); return; }
  lineUserId = uid;
  displayName = name;
  document.getElementById('fallback-panel').classList.remove('show');
  document.getElementById('chat-container').style.display = 'flex';
  await startSession();
}

async function startSession() {
  document.getElementById('chat-container').style.display = 'flex';
  try {
    const resp = await fetch('/api/lumi/session/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lineUserId, displayName }),
    });
    const data = await resp.json();
    if (!data.sessionId) throw new Error(data.error || 'session start failed');
    sessionId = data.sessionId;
    inputEl.disabled = false;
    sendBtn.disabled = false;
    setProgress(data.currentQuestion || 1);

    // Show intro + restore history if any
    if (data.history && data.history.length > 0) {
      data.history.forEach(m => addMsg(m.role === 'user' ? 'user' : 'ai', m.content));
    } else {
      addMsg('ai', `嗨 ${displayName || '你'}～我是 Lumi，Bago 老師的 AI 顧問。\n\n花 5-10 分鐘，7 題我陪你看見自己的盲點。\n\n**第 1 題**：你的目標是什麼？理想中的樣子長什麼樣？`);
    }
    inputEl.focus();
  } catch (e) {
    console.error(e);
    addMsg('system', '連線失敗：' + e.message);
  }
}

async function sendMessage(ev) {
  ev.preventDefault();
  const text = inputEl.value.trim();
  if (!text || !sessionId) return;
  addMsg('user', text);
  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.disabled = true;
  setTyping(true);

  try {
    const resp = await fetch('/api/lumi/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, text }),
    });
    const data = await resp.json();
    setTyping(false);

    if (data.error) {
      addMsg('system', '出錯了：' + data.error);
    } else {
      if (data.reply) addMsg('ai', data.reply);
      if (data.currentQuestion) setProgress(data.currentQuestion);
      if (data.reportGenerated && !reportShown) {
        reportShown = true;
        if (data.reportUrl) {
          addMsg('report-done', '報告已生成，也會傳到你的 LINE');
          addMsg('ai', `完整報告：[點我看報告](${data.reportUrl})`);
        } else {
          addMsg('report-done', '報告已生成');
        }
      }
    }
  } catch (e) {
    setTyping(false);
    addMsg('system', '網路錯誤：' + e.message);
  } finally {
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// Boot
initLiff();
</script>

</body>
</html>
