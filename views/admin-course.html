<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bago 派 Portal — 課程後台</title>
<style>
  :root {
    --brand-700: #2B44B0;
    --brand-500: #3B5BDB;
    --accent: #D99A2B;
    --ink-900: #1c1c1e;
    --ink-700: #4a4a4e;
    --ink-500: #888;
    --ink-300: #c8c8cc;
    --ink-200: #e5e5ea;
    --ink-100: #f5f5f7;
    --bg: #fafafa;
    --surface: #fff;
    --status-paid: #2e7d32;
    --status-pending: #D99A2B;
    --status-failed: #c62828;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--ink-900);
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-size: 14px;
  }
  aside.sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--ink-200);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .brand {
    padding: 18px 20px;
    border-bottom: 1px solid var(--ink-200);
    font-size: 15px;
    font-weight: 700;
    color: var(--brand-700);
  }
  .brand small { display: block; font-size: 11px; color: var(--ink-500); font-weight: 400; margin-top: 3px; letter-spacing: 0.04em; }
  .nav { padding: 14px 8px; flex: 1; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 6px;
    color: var(--ink-700);
    cursor: pointer;
    text-decoration: none;
    font-size: 13.5px;
  }
  .nav-item:hover { background: var(--ink-100); }
  .nav-item.active { background: #ECEFF8; color: var(--brand-700); font-weight: 600; }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }
  header.top {
    background: var(--surface);
    border-bottom: 1px solid var(--ink-200);
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header.top h1 { font-size: 18px; color: var(--ink-900); font-weight: 700; }
  .read-only-badge {
    background: var(--ink-100);
    color: var(--ink-500);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  /* stats */
  .stats {
    background: var(--surface);
    border-bottom: 1px solid var(--ink-200);
    padding: 14px 24px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--ink-100);
    padding: 10px 16px;
    border-radius: 8px;
    min-width: 130px;
  }
  .stat .label { font-size: 11px; color: var(--ink-500); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
  .stat .value { font-size: 20px; font-weight: 700; color: var(--ink-900); }
  .stat .value.money { color: var(--brand-700); }
  .stat .value.paid { color: var(--status-paid); }
  .stat .value.pending { color: var(--status-pending); }
  /* tab chips */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--ink-200);
    padding: 12px 24px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--ink-200);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12.5px;
    cursor: pointer;
    color: var(--ink-700);
  }
  .chip.active { background: var(--brand-700); color: #fff; border-color: var(--brand-700); }
  .toolbar-spacer { flex: 1; }
  .search-box {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .search-box input {
    width: 220px;
    padding: 6px 12px;
    border: 1px solid var(--ink-200);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
  }
  .search-box input:focus { outline: none; border-color: var(--brand-500); }
  .filter-select {
    padding: 6px 10px;
    border: 1px solid var(--ink-200);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    background: var(--surface);
  }
  /* content area */
  .content-area { flex: 1; overflow-y: auto; padding: 16px 24px; }
  table.list { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; border: 1px solid var(--ink-200); }
  table.list th { background: var(--ink-100); padding: 11px 14px; text-align: left; font-size: 12px; color: var(--ink-500); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--ink-200); }
  table.list td { padding: 13px 14px; border-bottom: 1px solid var(--ink-100); font-size: 13.5px; }
  table.list tr { cursor: pointer; }
  table.list tr:hover td { background: var(--ink-100); }
  table.list tr:last-child td { border-bottom: 0; }
  .name { font-weight: 600; color: var(--ink-900); }
  .uid-short { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: var(--ink-500); background: var(--ink-100); padding: 2px 6px; border-radius: 3px; }
  .status-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
  }
  .status-tag.paid, .status-tag.success { background: var(--status-paid); }
  .status-tag.pending { background: var(--status-pending); }
  .status-tag.failed, .status-tag.refunded { background: var(--status-failed); }
  .empty { padding: 60px 20px; text-align: center; color: var(--ink-500); font-size: 14px; }
  /* course list */
  .stage-card {
    background: var(--surface);
    border: 1px solid var(--ink-200);
    border-radius: 8px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .stage-head {
    background: var(--ink-100);
    padding: 12px 16px;
    border-bottom: 1px solid var(--ink-200);
  }
  .stage-head .stage-title { font-weight: 700; color: var(--brand-700); font-size: 14px; }
  .stage-head .stage-desc { font-size: 12px; color: var(--ink-500); margin-top: 2px; }
  .lesson-row {
    padding: 10px 16px;
    border-bottom: 1px solid var(--ink-100);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }
  .lesson-row:last-child { border-bottom: 0; }
  .lesson-id { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: var(--ink-500); width: 60px; flex-shrink: 0; }
  .lesson-title { flex: 1; color: var(--ink-900); }
  .lesson-duration { color: var(--ink-500); font-size: 12px; width: 60px; text-align: right; }
  .lesson-video {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    width: 70px;
    text-align: center;
    flex-shrink: 0;
  }
  .lesson-video.has { background: #E3F2E3; color: var(--status-paid); }
  .lesson-video.none { background: var(--ink-100); color: var(--ink-500); }
  /* drawer */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .drawer-overlay.show { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0;
    right: -680px;
    width: 580px;
    max-width: 100%;
    height: 100vh;
    background: var(--surface);
    box-shadow: -4px 0 24px rgba(0,0,0,0.1);
    z-index: 101;
    overflow-y: auto;
    transition: right 0.25s ease;
  }
  .drawer.show { right: 0; }
  .drawer-head {
    padding: 18px 24px;
    border-bottom: 1px solid var(--ink-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }
  .drawer-head h2 { font-size: 17px; }
  .drawer-close { background: 0; border: 0; font-size: 24px; cursor: pointer; color: var(--ink-500); padding: 0 6px; }
  .drawer-body { padding: 18px 24px; }
  .drawer-section { margin-bottom: 22px; }
  .drawer-section h3 { font-size: 13px; color: var(--ink-500); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .meta-grid { display: grid; grid-template-columns: 110px 1fr; gap: 6px 14px; font-size: 13px; word-break: break-all; }
  .meta-grid dt { color: var(--ink-500); }
  .meta-grid dd { color: var(--ink-900); }
  pre.raw {
    background: var(--ink-100);
    padding: 10px 12px;
    border-radius: 5px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 11.5px;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--ink-700);
    max-height: 240px;
    overflow-y: auto;
  }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="brand">Bago 派 Portal<small>v1.5 · 課程後台</small></div>
  <nav class="nav">
    <a class="nav-item" href="/admin/lumi"><span>📋</span> Lumi 客戶管理</a>
    <a class="nav-item active"><span>📚</span> 課程後台</a>
  </nav>
</aside>

<main>
  <header class="top">
    <h1>課程後台</h1>
    <span class="read-only-badge">v1.5 · READ ONLY</span>
  </header>

  <div class="stats" id="stats">
    <div class="stat"><div class="label">總會員數</div><div class="value" id="stat-users">—</div></div>
    <div class="stat"><div class="label">總訂單金額</div><div class="value money" id="stat-amount">—</div></div>
    <div class="stat"><div class="label">已付款</div><div class="value paid" id="stat-paid">—</div></div>
    <div class="stat"><div class="label">待付款</div><div class="value pending" id="stat-pending">—</div></div>
  </div>

  <div class="toolbar">
    <span class="chip active" data-tab="course">📚 課程內容</span>
    <span class="chip" data-tab="users">👥 會員列表</span>
    <span class="chip" data-tab="payments">💳 訂單列表</span>

    <div class="toolbar-spacer"></div>

    <div class="search-box" id="users-search" style="display:none">
      <input type="text" id="users-q" placeholder="搜尋名字 / email / 電話 / LINE ID">
      <button class="chip" onclick="loadUsers()">搜尋</button>
    </div>

    <div class="search-box" id="payments-filter" style="display:none">
      <select class="filter-select" id="payments-status" onchange="loadPayments()">
        <option value="all">全部狀態</option>
        <option value="paid">已付款</option>
        <option value="pending">待付款</option>
        <option value="failed">失敗</option>
      </select>
    </div>
  </div>

  <div class="content-area" id="content-area">
    <div class="empty">載入中...</div>
  </div>
</main>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h2 id="drawer-title">詳情</h2>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body">載入中...</div>
</div>

<script>
let currentTab = 'course';
let courseCache = null;
let usersCache = [];
let paymentsCache = [];

async function api(path) {
  const resp = await fetch(path, { credentials: 'same-origin' });
  if (resp.status === 403 || resp.status === 401) {
    window.location.href = '/admin/lumi/login';
    throw new Error('需要重新登入');
  }
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
  return data;
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
}

function fmtTime(t) {
  if (!t) return '—';
  return new Date(t).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
}

function fmtMoney(n) {
  if (n === null || n === undefined) return '—';
  return 'NT$ ' + Number(n).toLocaleString('zh-TW');
}

// ----- tabs -----
document.querySelectorAll('.chip[data-tab]').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-tab]').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    currentTab = c.dataset.tab;
    document.getElementById('users-search').style.display = currentTab === 'users' ? 'flex' : 'none';
    document.getElementById('payments-filter').style.display = currentTab === 'payments' ? 'flex' : 'none';
    if (currentTab === 'course') renderCourse();
    else if (currentTab === 'users') loadUsers();
    else if (currentTab === 'payments') loadPayments();
  });
});

// ----- stats -----
function renderStats(stats) {
  if (!stats) return;
  document.getElementById('stat-users').textContent = stats.totalUsers ?? '—';
  document.getElementById('stat-amount').textContent = fmtMoney(stats.totalPaidAmount);
  document.getElementById('stat-paid').textContent = stats.paidCount ?? '—';
  document.getElementById('stat-pending').textContent = stats.pendingCount ?? '—';
}

async function loadStats() {
  try {
    // 用 payments endpoint 順便拿全局 stats
    const data = await api('/admin/course/api/payments?status=all');
    renderStats(data.stats);
  } catch (e) {
    console.warn('stats fail', e.message);
  }
}

// ----- course tab -----
async function renderCourse() {
  const area = document.getElementById('content-area');
  area.innerHTML = '<div class="empty">載入中...</div>';
  try {
    if (!courseCache) {
      courseCache = await api('/admin/course/api/course');
    }
    const c = courseCache;
    const totalLessons = (c.stages || []).reduce((s, st) => s + (st.lessons || []).length, 0);
    const withVideo = (c.stages || []).reduce(
      (s, st) => s + (st.lessons || []).filter(l => l.videoUrl).length, 0
    );
    const headerHtml = `
      <div style="background:var(--surface);border:1px solid var(--ink-200);border-radius:8px;padding:14px 18px;margin-bottom:14px;">
        <div style="font-weight:700;font-size:15px;color:var(--ink-900)">${escapeHtml(c.title || '')} <span style="color:var(--ink-500);font-weight:400;font-size:13px">— ${escapeHtml(c.subtitle || '')}</span></div>
        <div style="margin-top:8px;font-size:12.5px;color:var(--ink-500)">
          講師：${escapeHtml(c.instructor || '')}　·
          定價：${fmtMoney(c.price)} / ${fmtMoney(c.priceV2)}　·
          ${(c.stages || []).length} 個階段　·
          ${totalLessons} 堂課（已上傳影片 ${withVideo}）
        </div>
      </div>
    `;
    const stagesHtml = (c.stages || []).map(stage => {
      const lessonsHtml = (stage.lessons || []).map(l => `
        <div class="lesson-row" onclick='openLessonDrawer(${JSON.stringify(stage.title).replace(/'/g, "&#39;")}, ${JSON.stringify(l).replace(/'/g, "&#39;")})'>
          <div class="lesson-id">${escapeHtml(l.id || '')}</div>
          <div class="lesson-title">${escapeHtml(l.title || '')}</div>
          <div class="lesson-video ${l.videoUrl ? 'has' : 'none'}">${l.videoUrl ? '✓ 影片' : '尚未'}</div>
          <div class="lesson-duration">${escapeHtml(l.duration || '')}</div>
        </div>
      `).join('');
      return `
        <div class="stage-card">
          <div class="stage-head">
            <div class="stage-title">${escapeHtml(stage.id || '')} · ${escapeHtml(stage.title || '')}</div>
            <div class="stage-desc">${escapeHtml(stage.description || '')}</div>
          </div>
          ${lessonsHtml}
        </div>
      `;
    }).join('');
    area.innerHTML = headerHtml + stagesHtml;
  } catch (e) {
    area.innerHTML = `<div class="empty">載入失敗：${escapeHtml(e.message)}</div>`;
  }
}

function openLessonDrawer(stageTitle, lesson) {
  document.getElementById('drawer-title').textContent = lesson.title || '單元詳情';
  document.getElementById('drawer-body').innerHTML = `
    <div class="drawer-section">
      <h3>單元資料</h3>
      <dl class="meta-grid">
        <dt>所屬階段</dt><dd>${escapeHtml(stageTitle)}</dd>
        <dt>單元 ID</dt><dd><code class="uid-short">${escapeHtml(lesson.id || '')}</code></dd>
        <dt>標題</dt><dd>${escapeHtml(lesson.title || '')}</dd>
        <dt>長度</dt><dd>${escapeHtml(lesson.duration || '—')}</dd>
        <dt>影片連結</dt><dd>${lesson.videoUrl ? `<a href="${escapeHtml(lesson.videoUrl)}" target="_blank" style="color:var(--brand-500);word-break:break-all">${escapeHtml(lesson.videoUrl)}</a>` : '<span style="color:var(--ink-500)">尚未上傳</span>'}</dd>
      </dl>
    </div>
    <div class="drawer-section">
      <h3>原始資料</h3>
      <pre class="raw">${escapeHtml(JSON.stringify(lesson, null, 2))}</pre>
    </div>
    <div class="drawer-section" style="color:var(--ink-500);font-size:12px">
      v1.5 read-only — 編輯課程內容 5/28 後 ship。改 course.json 請走 git。
    </div>
  `;
  showDrawer();
}

// ----- users tab -----
async function loadUsers() {
  const area = document.getElementById('content-area');
  area.innerHTML = '<div class="empty">載入中...</div>';
  try {
    const q = document.getElementById('users-q').value.trim();
    const url = '/admin/course/api/users' + (q ? '?q=' + encodeURIComponent(q) : '');
    const data = await api(url);
    usersCache = data.users || [];
    if (usersCache.length === 0) {
      area.innerHTML = '<div class="empty">沒有符合條件的會員</div>';
      return;
    }
    const rows = usersCache.map(u => {
      const status = u.paymentStatus || 'pending';
      return `<tr onclick="openUserDrawer('${u._id}')">
        <td><div class="name">${escapeHtml(u.name || '（未填名）')}</div></td>
        <td>${escapeHtml(u.email || '—')}</td>
        <td>${escapeHtml(u.phone || '—')}</td>
        <td><span class="status-tag ${status}">${status === 'paid' ? '已付款' : status === 'pending' ? '待付款' : status === 'refunded' ? '已退款' : escapeHtml(status)}</span></td>
        <td style="color:var(--ink-500);font-size:12px">${escapeHtml(u.plan || 'v1')}</td>
        <td style="color:var(--ink-500)">${fmtTime(u.createdAt)}</td>
      </tr>`;
    }).join('');
    area.innerHTML = `<table class="list">
      <thead><tr><th>名字</th><th>Email</th><th>電話</th><th>付款狀態</th><th>方案</th><th>註冊時間</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  } catch (e) {
    area.innerHTML = `<div class="empty">載入失敗：${escapeHtml(e.message)}</div>`;
  }
}

function openUserDrawer(userId) {
  const u = usersCache.find(x => x._id === userId);
  if (!u) return;
  document.getElementById('drawer-title').textContent = (u.name || '會員') + ' · 詳情';
  const completed = (u.completedLessons || []).length;
  const purchased = (u.purchasedCourses || []).join(', ') || '—';
  document.getElementById('drawer-body').innerHTML = `
    <div class="drawer-section">
      <h3>基本資料</h3>
      <dl class="meta-grid">
        <dt>名字</dt><dd>${escapeHtml(u.name || '—')}</dd>
        <dt>Email</dt><dd>${escapeHtml(u.email || '—')}</dd>
        <dt>電話</dt><dd>${escapeHtml(u.phone || '—')}</dd>
        <dt>LINE ID</dt><dd>${u.lineUserId ? `<code class="uid-short">${escapeHtml(u.lineUserId)}</code>` : '—'}</dd>
        <dt>來源</dt><dd>${escapeHtml(u.source || '—')}</dd>
      </dl>
    </div>
    <div class="drawer-section">
      <h3>付款狀態</h3>
      <dl class="meta-grid">
        <dt>狀態</dt><dd><span class="status-tag ${u.paymentStatus || 'pending'}">${u.paymentStatus === 'paid' ? '已付款' : u.paymentStatus === 'pending' ? '待付款' : u.paymentStatus === 'refunded' ? '已退款' : escapeHtml(u.paymentStatus || '—')}</span></dd>
        <dt>方案</dt><dd>${escapeHtml(u.plan || 'v1')}</dd>
        <dt>付款時間</dt><dd>${fmtTime(u.paidAt)}</dd>
        <dt>已購課程</dt><dd>${escapeHtml(purchased)}</dd>
      </dl>
    </div>
    <div class="drawer-section">
      <h3>學習進度</h3>
      <dl class="meta-grid">
        <dt>已完成單元</dt><dd>${completed} 個</dd>
        <dt>單元清單</dt><dd style="font-family:'SF Mono',Monaco,monospace;font-size:11.5px;color:var(--ink-700)">${(u.completedLessons || []).join(', ') || '—'}</dd>
      </dl>
    </div>
    <div class="drawer-section">
      <h3>系統</h3>
      <dl class="meta-grid">
        <dt>User ID</dt><dd><code class="uid-short">${escapeHtml(u._id)}</code></dd>
        <dt>Token</dt><dd>${u.courseToken ? `<code class="uid-short">${escapeHtml(u.courseToken)}</code>` : '—'}</dd>
        <dt>註冊時間</dt><dd>${fmtTime(u.createdAt)}</dd>
      </dl>
    </div>
  `;
  showDrawer();
}

// ----- payments tab -----
async function loadPayments() {
  const area = document.getElementById('content-area');
  area.innerHTML = '<div class="empty">載入中...</div>';
  try {
    const status = document.getElementById('payments-status').value;
    const data = await api('/admin/course/api/payments?status=' + encodeURIComponent(status));
    paymentsCache = data.payments || [];
    renderStats(data.stats);
    if (paymentsCache.length === 0) {
      area.innerHTML = '<div class="empty">沒有符合條件的訂單</div>';
      return;
    }
    const rows = paymentsCache.map(p => {
      const userName = (p.userId && (p.userId.name || p.userId.email)) || '—';
      return `<tr onclick="openPaymentDrawer('${p._id}')">
        <td><code class="uid-short">${escapeHtml(p.orderId || '—')}</code></td>
        <td><div class="name">${escapeHtml(userName)}</div></td>
        <td>${escapeHtml(p.courseName || '—')}</td>
        <td style="font-weight:600">${fmtMoney(p.amount)}</td>
        <td><span class="status-tag ${p.status}">${p.status === 'success' ? '已付款' : p.status === 'pending' ? '待付款' : p.status === 'failed' ? '失敗' : escapeHtml(p.status)}</span></td>
        <td style="color:var(--ink-500);font-size:12px">${escapeHtml(p.method || '—')}</td>
        <td style="color:var(--ink-500)">${fmtTime(p.createdAt)}</td>
      </tr>`;
    }).join('');
    area.innerHTML = `<table class="list">
      <thead><tr><th>訂單編號</th><th>用戶</th><th>課程</th><th>金額</th><th>狀態</th><th>方式</th><th>建立時間</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  } catch (e) {
    area.innerHTML = `<div class="empty">載入失敗：${escapeHtml(e.message)}</div>`;
  }
}

function openPaymentDrawer(paymentId) {
  const p = paymentsCache.find(x => x._id === paymentId);
  if (!p) return;
  const userName = (p.userId && (p.userId.name || p.userId.email)) || '—';
  const userLine = p.userId ? `${escapeHtml(p.userId.name || '')} ${p.userId.email ? '· ' + escapeHtml(p.userId.email) : ''} ${p.userId.lineUserId ? '· <code class="uid-short">'+escapeHtml(p.userId.lineUserId)+'</code>' : ''}` : '—';
  document.getElementById('drawer-title').textContent = '訂單 ' + (p.orderId || '');
  document.getElementById('drawer-body').innerHTML = `
    <div class="drawer-section">
      <h3>訂單資料</h3>
      <dl class="meta-grid">
        <dt>訂單編號</dt><dd><code class="uid-short">${escapeHtml(p.orderId || '—')}</code></dd>
        <dt>狀態</dt><dd><span class="status-tag ${p.status}">${p.status === 'success' ? '已付款' : p.status === 'pending' ? '待付款' : p.status === 'failed' ? '失敗' : escapeHtml(p.status)}</span></dd>
        <dt>課程</dt><dd>${escapeHtml(p.courseName || '—')}</dd>
        <dt>方案</dt><dd>${escapeHtml(p.plan || 'v1')}</dd>
        <dt>金額</dt><dd style="font-weight:700;color:var(--brand-700)">${fmtMoney(p.amount)}</dd>
        <dt>付款方式</dt><dd>${escapeHtml(p.method || '—')}</dd>
        <dt>TapPay ID</dt><dd>${p.tradeId ? `<code class="uid-short">${escapeHtml(p.tradeId)}</code>` : '—'}</dd>
      </dl>
    </div>
    <div class="drawer-section">
      <h3>用戶</h3>
      <div style="font-size:13px">${userLine}</div>
    </div>
    <div class="drawer-section">
      <h3>時間</h3>
      <dl class="meta-grid">
        <dt>建立</dt><dd>${fmtTime(p.createdAt)}</dd>
        <dt>付款</dt><dd>${fmtTime(p.paidAt)}</dd>
      </dl>
    </div>
    <div class="drawer-section">
      <h3>原始 callback</h3>
      <pre class="raw">${escapeHtml(JSON.stringify(p.rawData || {}, null, 2))}</pre>
    </div>
  `;
  showDrawer();
}

// ----- drawer -----
function showDrawer() {
  document.getElementById('drawer').classList.add('show');
  document.getElementById('drawer-overlay').classList.add('show');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('show');
  document.getElementById('drawer-overlay').classList.remove('show');
}

// search 按 Enter
document.getElementById('users-q').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadUsers();
});

// 初始化
loadStats();
renderCourse();
</script>
</body>
</html>
