<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIbuild · 課程後台</title>
<style>
  :root {
    --brand-700: #2B44B0;
    --brand-500: #3B5BDB;
    --accent: #D99A2B;
    --ink-900: #1c1c1e;
    --ink-700: #4a4a4e;
    --ink-500: #888;
    --ink-300: #c8c8cc;
    --ink-200: #e5e5ea;
    --ink-100: #f5f5f7;
    --bg: #fafafa;
    --surface: #fff;
    --status-paid: #2e7d32;
    --status-pending: #D99A2B;
    --status-failed: #c62828;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--ink-900);
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-size: 14px;
  }
  aside.sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--ink-200);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .brand {
    padding: 18px 20px;
    border-bottom: 1px solid var(--ink-200);
    font-size: 15px;
    font-weight: 700;
    color: var(--brand-700);
  }
  .brand small { display: block; font-size: 11px; color: var(--ink-500); font-weight: 400; margin-top: 3px; letter-spacing: 0.04em; }
  .nav { padding: 14px 8px; flex: 1; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 6px;
    color: var(--ink-700);
    cursor: pointer;
    text-decoration: none;
    font-size: 13.5px;
  }
  .nav-item:hover { background: var(--ink-100); }
  .nav-item.active { background: #ECEFF8; color: var(--brand-700); font-weight: 600; }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }
  header.top {
    background: var(--surface);
    border-bottom: 1px solid var(--ink-200);
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header.top h1 { font-size: 18px; color: var(--ink-900); font-weight: 700; }
  .read-only-badge {
    background: var(--ink-100);
    color: var(--ink-500);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  /* stats */
  .stats {
    background: var(--surface);
    border-bottom: 1px solid var(--ink-200);
    padding: 14px 24px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--ink-100);
    padding: 10px 16px;
    border-radius: 8px;
    min-width: 130px;
  }
  .stat .label { font-size: 11px; color: var(--ink-500); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
  .stat .value { font-size: 20px; font-weight: 700; color: var(--ink-900); }
  .stat .value.money { color: var(--brand-700); }
  .stat .value.paid { color: var(--status-paid); }
  .stat .value.pending { color: var(--status-pending); }
  /* tab chips */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--ink-200);
    padding: 12px 24px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--ink-200);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12.5px;
    cursor: pointer;
    color: var(--ink-700);
  }
  .chip.active { background: var(--brand-700); color: #fff; border-color: var(--brand-700); }
  .toolbar-spacer { flex: 1; }
  .search-box {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .search-box input {
    width: 220px;
    padding: 6px 12px;
    border: 1px solid var(--ink-200);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
  }
  .search-box input:focus { outline: none; border-color: var(--brand-500); }
  .filter-select {
    padding: 6px 10px;
    border: 1px solid var(--ink-200);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    background: var(--surface);
  }
  /* content area */
  .content-area { flex: 1; overflow-y: auto; padding: 16px 24px; }
  table.list { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; border: 1px solid var(--ink-200); }
  table.list th { background: var(--ink-100); padding: 11px 14px; text-align: left; font-size: 12px; color: var(--ink-500); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--ink-200); }
  table.list td { padding: 13px 14px; border-bottom: 1px solid var(--ink-100); font-size: 13.5px; }
  table.list tr { cursor: pointer; }
  table.list tr:hover td { background: var(--ink-100); }
  table.list tr:last-child td { border-bottom: 0; }
  .name { font-weight: 600; color: var(--ink-900); }
  .uid-short { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: var(--ink-500); background: var(--ink-100); padding: 2px 6px; border-radius: 3px; }
  .status-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
  }
  .status-tag.paid, .status-tag.success { background: var(--status-paid); }
  .status-tag.pending { background: var(--status-pending); }
  .status-tag.failed, .status-tag.refunded { background: var(--status-failed); }
  .empty { padding: 60px 20px; text-align: center; color: var(--ink-500); font-size: 14px; }
  /* course list */
  .stage-card {
    background: var(--surface);
    border: 1px solid var(--ink-200);
    border-radius: 8px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .stage-head {
    background: var(--ink-100);
    padding: 12px 16px;
    border-bottom: 1px solid var(--ink-200);
  }
  .stage-head .stage-title { font-weight: 700; color: var(--brand-700); font-size: 14px; }
  .stage-head .stage-desc { font-size: 12px; color: var(--ink-500); margin-top: 2px; }
  .lesson-row {
    padding: 10px 16px;
    border-bottom: 1px solid var(--ink-100);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }
  .lesson-row:last-child { border-bottom: 0; }
  .lesson-id { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: var(--ink-500); width: 60px; flex-shrink: 0; }
  .lesson-title { flex: 1; color: var(--ink-900); }
  .lesson-duration { color: var(--ink-500); font-size: 12px; width: 60px; text-align: right; }
  .lesson-video {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    width: 70px;
    text-align: center;
    flex-shrink: 0;
  }
  .lesson-video.has { background: #E3F2E3; color: var(--status-paid); }
  .lesson-video.none { background: var(--ink-100); color: var(--ink-500); }
  /* drawer */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .drawer-overlay.show { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0;
    right: -680px;
    width: 580px;
    max-width: 100%;
    height: 100vh;
    background: var(--surface);
    box-shadow: -4px 0 24px rgba(0,0,0,0.1);
    z-index: 101;
    overflow-y: auto;
    transition: right 0.25s ease;
  }
  .drawer.show { right: 0; }
  .drawer-head {
    padding: 18px 24px;
    border-bottom: 1px solid var(--ink-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }
  .drawer-head h2 { font-size: 17px; }
  .drawer-close { background: 0; border: 0; font-size: 24px; cursor: pointer; color: var(--ink-500); padding: 0 6px; }
  .drawer-body { padding: 18px 24px; }
  .drawer-section { margin-bottom: 22px; }
  .drawer-section h3 { font-size: 13px; color: var(--ink-500); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .meta-grid { display: grid; grid-template-columns: 110px 1fr; gap: 6px 14px; font-size: 13px; word-break: break-all; }
  .meta-grid dt { color: var(--ink-500); }
  .meta-grid dd { color: var(--ink-900); }
  pre.raw {
    background: var(--ink-100);
    padding: 10px 12px;
    border-radius: 5px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 11.5px;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--ink-700);
    max-height: 240px;
    overflow-y: auto;
  }
  /* publish form */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--ink-200);
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 16px;
  }
  .form-card h2 { font-size: 15px; color: var(--brand-700); margin-bottom: 14px; }
  .form-card h3 { font-size: 13px; color: var(--ink-500); text-transform: uppercase; letter-spacing: 0.06em; margin: 18px 0 10px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12.5px; color: var(--ink-700); margin-bottom: 6px; font-weight: 600; }
  .field label .req { color: #c62828; margin-left: 2px; }
  .field input[type="text"],
  .field input[type="number"],
  .field input[type="url"],
  .field input[type="date"],
  .field select,
  .field textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--ink-200);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13.5px;
    background: var(--surface);
    color: var(--ink-900);
  }
  .field textarea { min-height: 110px; resize: vertical; font-family: 'SF Mono', Monaco, monospace; font-size: 12.5px; line-height: 1.6; }
  .field input:focus,
  .field select:focus,
  .field textarea:focus { outline: none; border-color: var(--brand-500); box-shadow: 0 0 0 3px rgba(59,91,219,0.12); }
  .field .hint { font-size: 11px; color: var(--ink-500); margin-top: 4px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  @media (max-width: 720px) { .row-2, .row-3 { grid-template-columns: 1fr; } }
  .chapter-card {
    background: var(--ink-100);
    border: 1px solid var(--ink-200);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .chapter-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .chapter-head .ch-num { font-size: 12px; color: var(--brand-700); font-weight: 700; letter-spacing: 0.04em; }
  .btn {
    background: var(--brand-700);
    color: #fff;
    border: 0;
    padding: 9px 18px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn:hover { background: var(--brand-500); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.ghost { background: var(--surface); color: var(--ink-700); border: 1px solid var(--ink-200); }
  .btn.ghost:hover { background: var(--ink-100); }
  .btn.danger { background: var(--surface); color: var(--status-failed); border: 1px solid var(--ink-200); }
  .btn.danger:hover { background: #FFEBEE; border-color: var(--status-failed); }
  .btn.accent { background: var(--accent); }
  .btn.accent:hover { background: #c08524; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink-900);
    color: #fff;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, bottom 0.2s;
  }
  .toast.show { opacity: 1; bottom: 50px; }
  .toast.error { background: var(--status-failed); }
  .toast.ok { background: var(--status-paid); }
  /* publish list */
  .pub-status {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }
  .pub-status.draft { background: #FFF3E0; color: var(--accent); }
  .pub-status.published { background: #E3F2E3; color: var(--status-paid); }
  .pub-status.unpublished { background: #FFEBEE; color: var(--status-failed); }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="brand">AIbuild<small>始於自己 終於 AI</small></div>
  <nav class="nav">
    <a class="nav-item" href="/admin/lumi"><span class="icon">📋</span> 客戶管理</a>
    <a class="nav-item" href="/admin/setup-wizard"><span class="icon">🧙</span> 設定精靈</a>
    <a class="nav-item" href="/admin/generator"><span class="icon">🌐</span> 網站生成</a>
    <a class="nav-item" href="/admin/line-cards"><span class="icon">💬</span> LINE 圖卡</a>
    <a class="nav-item" href="/admin/line-bot"><span class="icon">🤖</span> LINE 機器人</a>
    <a class="nav-item" href="/admin/ads"><span class="icon">📣</span> 廣告投放</a>
    <a class="nav-item active" href="/admin/course"><span class="icon">📚</span> 課程後台</a>
    <a class="nav-item disabled" style="opacity:0.5;cursor:not-allowed"><span class="icon">📊</span> 自動化直播 <small style="font-size:10px;color:var(--ink-500)">v3</small></a>
  </nav>
</aside>

<main>
  <header class="top">
    <h1>課程後台</h1>
    <span class="read-only-badge">v1.5 · 上架功能 BETA</span>
  </header>

  <div class="stats" id="stats">
    <div class="stat"><div class="label">總會員數</div><div class="value" id="stat-users">—</div></div>
    <div class="stat"><div class="label">總訂單金額</div><div class="value money" id="stat-amount">—</div></div>
    <div class="stat"><div class="label">已付款</div><div class="value paid" id="stat-paid">—</div></div>
    <div class="stat"><div class="label">待付款</div><div class="value pending" id="stat-pending">—</div></div>
  </div>

  <div class="toolbar">
    <span class="chip active" data-tab="course">📚 課程列表</span>
    <span class="chip" data-tab="publish">🚀 上架新課程</span>
    <span class="chip" data-tab="users">👥 會員列表</span>
    <span class="chip" data-tab="payments">💳 訂單列表</span>

    <div class="toolbar-spacer"></div>

    <div class="search-box" id="users-search" style="display:none">
      <input type="text" id="users-q" placeholder="搜尋名字 / email / 電話 / LINE ID">
      <button class="chip" onclick="loadUsers()">搜尋</button>
    </div>

    <div class="search-box" id="payments-filter" style="display:none">
      <select class="filter-select" id="payments-status" onchange="loadPayments()">
        <option value="all">全部狀態</option>
        <option value="paid">已付款</option>
        <option value="pending">待付款</option>
        <option value="failed">失敗</option>
      </select>
    </div>
  </div>

  <div class="content-area" id="content-area">
    <div class="empty">載入中...</div>
  </div>
</main>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h2 id="drawer-title">詳情</h2>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body">載入中...</div>
</div>

<script>
let currentTab = 'course';
let courseCache = null;
let usersCache = [];
let paymentsCache = [];

async function api(path) {
  const resp = await fetch(path, { credentials: 'same-origin' });
  if (resp.status === 403 || resp.status === 401) {
    window.location.href = '/admin/lumi/login';
    throw new Error('需要重新登入');
  }
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
  return data;
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
}

function fmtTime(t) {
  if (!t) return '—';
  return new Date(t).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
}

function fmtMoney(n) {
  if (n === null || n === undefined) return '—';
  return 'NT$ ' + Number(n).toLocaleString('zh-TW');
}

// ----- tabs -----
document.querySelectorAll('.chip[data-tab]').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-tab]').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    currentTab = c.dataset.tab;
    document.getElementById('users-search').style.display = currentTab === 'users' ? 'flex' : 'none';
    document.getElementById('payments-filter').style.display = currentTab === 'payments' ? 'flex' : 'none';
    if (currentTab === 'course') renderCourse();
    else if (currentTab === 'publish') renderPublish();
    else if (currentTab === 'users') loadUsers();
    else if (currentTab === 'payments') loadPayments();
  });
});

// ----- toast -----
function toast(msg, kind = '') {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.className = 'toast ' + kind;
  t.textContent = msg;
  // 強制 reflow 讓 transition 重觸發
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}

async function apiSend(path, method, body) {
  const resp = await fetch(path, {
    method,
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (resp.status === 403 || resp.status === 401) {
    window.location.href = '/admin/lumi/login';
    throw new Error('需要重新登入');
  }
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
  return data;
}

// ----- stats -----
function renderStats(stats) {
  if (!stats) return;
  document.getElementById('stat-users').textContent = stats.totalUsers ?? '—';
  document.getElementById('stat-amount').textContent = fmtMoney(stats.totalPaidAmount);
  document.getElementById('stat-paid').textContent = stats.paidCount ?? '—';
  document.getElementById('stat-pending').textContent = stats.pendingCount ?? '—';
}

async function loadStats() {
  try {
    // 用 payments endpoint 順便拿全局 stats
    const data = await api('/admin/course/api/payments?status=all');
    renderStats(data.stats);
  } catch (e) {
    console.warn('stats fail', e.message);
  }
}

// ----- course tab -----
async function renderCourse() {
  const area = document.getElementById('content-area');
  area.innerHTML = '<div class="empty">載入中...</div>';
  try {
    if (!courseCache) {
      courseCache = await api('/admin/course/api/course');
    }
    const c = courseCache;
    const totalLessons = (c.stages || []).reduce((s, st) => s + (st.lessons || []).length, 0);
    const withVideo = (c.stages || []).reduce(
      (s, st) => s + (st.lessons || []).filter(l => l.videoUrl).length, 0
    );
    const headerHtml = `
      <div style="background:var(--surface);border:1px solid var(--ink-200);border-radius:8px;padding:14px 18px;margin-bottom:14px;">
        <div style="font-weight:700;font-size:15px;color:var(--ink-900)">${escapeHtml(c.title || '')} <span style="color:var(--ink-500);font-weight:400;font-size:13px">— ${escapeHtml(c.subtitle || '')}</span></div>
        <div style="margin-top:8px;font-size:12.5px;color:var(--ink-500)">
          講師：${escapeHtml(c.instructor || '')}　·
          定價：${fmtMoney(c.price)} / ${fmtMoney(c.priceV2)}　·
          ${(c.stages || []).length} 個階段　·
          ${totalLessons} 堂課（已上傳影片 ${withVideo}）
        </div>
      </div>
    `;
    const stagesHtml = (c.stages || []).map(stage => {
      const lessonsHtml = (stage.lessons || []).map(l => `
        <div class="lesson-row" onclick='openLessonDrawer(${JSON.stringify(stage.title).replace(/'/g, "&#39;")}, ${JSON.stringify(l).replace(/'/g, "&#39;")})'>
          <div class="lesson-id">${escapeHtml(l.id || '')}</div>
          <div class="lesson-title">${escapeHtml(l.title || '')}</div>
          <div class="lesson-video ${l.videoUrl ? 'has' : 'none'}">${l.videoUrl ? '✓ 影片' : '尚未'}</div>
          <div class="lesson-duration">${escapeHtml(l.duration || '')}</div>
        </div>
      `).join('');
      return `
        <div class="stage-card">
          <div class="stage-head">
            <div class="stage-title">${escapeHtml(stage.id || '')} · ${escapeHtml(stage.title || '')}</div>
            <div class="stage-desc">${escapeHtml(stage.description || '')}</div>
          </div>
          ${lessonsHtml}
        </div>
      `;
    }).join('');
    area.innerHTML = headerHtml + stagesHtml;
  } catch (e) {
    area.innerHTML = `<div class="empty">載入失敗：${escapeHtml(e.message)}</div>`;
  }

let chapterRows = []; // [{ name, videoUrl, duration, intro }]

function addChapterRow(data = {}) {
  chapterRows.push({
    name: data.name || '',
    videoUrl: data.videoUrl || '',
    duration: data.duration || '',
    intro: data.intro || '',
  });
  renderChapterList();
}

function removeChapterRow(idx) {
  chapterRows.splice(idx, 1);
  renderChapterList();
}

function updateChapterField(idx, field, val) {
  if (chapterRows[idx]) chapterRows[idx][field] = val;
}

function renderChapterList() {
  const wrap = document.getElementById('chapters-area');
  if (!wrap) return;
  if (chapterRows.length === 0) {
    wrap.innerHTML = '<div class="hint" style="margin-bottom:10px">尚無章節，按下方「新增章節」加入</div>';
    return;
  }
  wrap.innerHTML = chapterRows.map((c, i) => `
    <div class="chapter-card">
      <div class="chapter-head">
        <span class="ch-num">第 ${i + 1} 章</span>
        <button type="button" class="btn danger" style="padding:4px 12px;font-size:12px" onclick="removeChapterRow(${i})">移除</button>
      </div>
      <div class="row-2">
        <div class="field" style="margin-bottom:10px">
          <label>章節名稱</label>
          <input type="text" value="${escapeHtml(c.name)}" oninput="updateChapterField(${i}, 'name', this.value)" placeholder="例：建立你的第一個原型">
        </div>
        <div class="field" style="margin-bottom:10px">
          <label>時長</label>
          <input type="text" value="${escapeHtml(c.duration)}" oninput="updateChapterField(${i}, 'duration', this.value)" placeholder="例：22:30">
        </div>
      </div>
      <div class="field" style="margin-bottom:10px">
        <label>影片 URL</label>
        <input type="url" value="${escapeHtml(c.videoUrl)}" oninput="updateChapterField(${i}, 'videoUrl', this.value)" placeholder="https://www.youtube.com/embed/...">
      </div>
      <div class="field" style="margin-bottom:0">
        <label>章節簡介</label>
        <input type="text" value="${escapeHtml(c.intro)}" oninput="updateChapterField(${i}, 'intro', this.value)" placeholder="一句話講這章在學什麼">
      </div>
    </div>
  `).join('');
}

function collectFormData() {
  const slug = document.getElementById('f-slug').value.trim();
  const title = document.getElementById('f-title').value.trim();
  const description = document.getElementById('f-description').value;
  const coverImage = document.getElementById('f-cover').value.trim();
  const priceRaw = document.getElementById('f-price').value;
  const earlyRaw = document.getElementById('f-earlyPrice').value;
  const earlyDeadline = document.getElementById('f-earlyDeadline').value;
  const status = document.getElementById('f-status').value;
  return {
    slug, title, description, coverImage,
    chapters: chapterRows.filter(c => c.name || c.videoUrl || c.intro),
    price: priceRaw === '' ? null : Number(priceRaw),
    earlyPrice: earlyRaw === '' ? null : Number(earlyRaw),
    earlyDeadline: earlyDeadline || null,
    status,
  };
}

function fillForm(course) {
  editingSlug = course.slug;
  document.getElementById('form-mode').textContent = `編輯：${course.title}`;
  document.getElementById('f-title').value = course.title || '';
  document.getElementById('f-slug').value = course.slug || '';
  document.getElementById('f-description').value = course.description || '';
  document.getElementById('f-cover').value = course.coverImage || '';
  document.getElementById('f-price').value = course.price ?? '';
  document.getElementById('f-earlyPrice').value = course.earlyPrice ?? '';
  document.getElementById('f-earlyDeadline').value = course.earlyDeadline ? course.earlyDeadline.slice(0, 10) : '';
  document.getElementById('f-status').value = course.status || 'draft';
  chapterRows = (course.chapters || []).map(c => ({
    name: c.name || '',
    videoUrl: c.videoUrl || '',
    duration: c.duration || '',
    intro: c.intro || '',
  }));
  if (chapterRows.length === 0) chapterRows.push({ name: '', videoUrl: '', duration: '', intro: '' });
  renderChapterList();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  editingSlug = null;
  document.getElementById('form-mode').textContent = '新增課程';
  ['f-title', 'f-slug', 'f-description', 'f-cover', 'f-price', 'f-earlyPrice', 'f-earlyDeadline'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-status').value = 'draft';
  chapterRows = [{ name: '', videoUrl: '', duration: '', intro: '' }];
  renderChapterList();
}

async function saveCourse(forcePublishedStatus) {
  const body = collectFormData();
  if (!body.slug) return toast('請填 slug', 'error');
  if (!body.title) return toast('請填課程標題', 'error');
  if (forcePublishedStatus) body.status = 'published';
  try {
    let resp;
    if (editingSlug) {
      resp = await apiSend(`/admin/course/api/courses/${encodeURIComponent(editingSlug)}`, 'PATCH', body);
      // 若 slug 改了 -> 後端用 :slug param 找原本的，不支援 rename slug；提示
      if (body.slug !== editingSlug) {
        toast('注意：slug 不可變更，已用原本的 slug 儲存', 'error');
      }
    } else {
      resp = await apiSend('/admin/course/api/courses', 'POST', body);
      editingSlug = resp.course.slug; // 切到 edit 模式
      document.getElementById('form-mode').textContent = `編輯：${resp.course.title}`;
    }
    toast(forcePublishedStatus ? '✅ 已上架' : '✅ 已儲存', 'ok');
    // refresh list
    const data = await api('/admin/course/api/courses');
    publishCache = data.courses || [];
    renderCourseList();
  } catch (e) {
    toast('失敗：' + e.message, 'error');
  }
}

async function deleteCourse(slug) {
  if (!confirm(`確定要下架課程「${slug}」？\n（v1.5 為軟刪除，僅改 status，資料保留）`)) return;
  try {
    await apiSend(`/admin/course/api/courses/${encodeURIComponent(slug)}`, 'DELETE');
    toast('已下架', 'ok');
    const data = await api('/admin/course/api/courses');
    publishCache = data.courses || [];
    renderCourseList();
    if (editingSlug === slug) resetForm();
  } catch (e) {
    toast('失敗：' + e.message, 'error');
  }
}

async function loadCourseForEdit(slug) {
  try {
    const data = await api(`/admin/course/api/courses/${encodeURIComponent(slug)}`);
    fillForm(data.course);
    toast('已載入到表單', 'ok');
  } catch (e) {
    toast('載入失敗：' + e.message, 'error');
  }
}

function previewCourse() {
  const slug = document.getElementById('f-slug').value.trim();
  if (!slug) return toast('請先填 slug 並儲存', 'error');
  if (!editingSlug) return toast('請先儲存後再預覽', 'error');
  window.open(`/admin/course/preview?slug=${encodeURIComponent(editingSlug)}`, '_blank');
}

function renderCourseList() {
  const wrap = document.getElementById('course-list');
  if (!wrap) return;
  if (publishCache.length === 0) {
    wrap.innerHTML = '<div class="empty" style="padding:24px">尚無課程，請從上方表單建立</div>';
    return;
  }
  const statusLabel = { draft: '草稿', published: '已上架', unpublished: '已下架' };
  const rows = publishCache.map(c => `
    <tr>
      <td><div class="name">${escapeHtml(c.title || '')}</div><div style="font-size:11px;color:var(--ink-500);margin-top:2px">/course/${escapeHtml(c.slug || '')}</div></td>
      <td>${c.chapterCount || 0} 章</td>
      <td>${c.price != null ? fmtMoney(c.price) : '—'}${c.earlyPrice != null ? `<div style="font-size:11px;color:var(--accent)">早鳥 ${fmtMoney(c.earlyPrice)}</div>` : ''}</td>
      <td><span class="pub-status ${c.status}">${statusLabel[c.status] || c.status}</span></td>
      <td style="color:var(--ink-500);font-size:12px">${fmtTime(c.updatedAt)}</td>
      <td style="text-align:right">
        <button class="btn ghost" style="padding:5px 10px;font-size:11.5px" onclick="loadCourseForEdit('${escapeHtml(c.slug)}')">編輯</button>
        <button class="btn ghost" style="padding:5px 10px;font-size:11.5px" onclick="window.open('/admin/course/preview?slug=${encodeURIComponent(c.slug)}', '_blank')">預覽</button>
        <button class="btn danger" style="padding:5px 10px;font-size:11.5px" onclick="deleteCourse('${escapeHtml(c.slug)}')">下架</button>
      </td>
    </tr>
  `).join('');
  wrap.innerHTML = `<table class="list">
    <thead><tr><th>課程</th><th>章節</th><th>定價</th><th>狀態</th><th>更新時間</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function bindPublishHandlers() {
  document.getElementById('btn-save').onclick = () => saveCourse(false);
  document.getElementById('btn-publish').onclick = () => saveCourse(true);
  document.getElementById('btn-preview').onclick = previewCourse;
  document.getElementById('btn-reset').onclick = () => {
    if (confirm('清空表單並退出編輯模式？')) resetForm();
  };
}

  document.getElementById('drawer-overlay').classList.remove('show');
}

// search 按 Enter
document.getElementById('users-q').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadUsers();
});

// 初始化
loadStats();
renderCourse();
</script>
