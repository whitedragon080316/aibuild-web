<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結帳 — {{siteName}}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    brand: { 500:'#3B5BDB', 600:'#2B44B0' },
    accent: { 400:'#E8A838', 500:'#d4922a' },
    purple: { 500:'#a855f7', 600:'#9333ea' }
  }, fontFamily: { sans: ['Noto Sans TC','sans-serif'] }}}
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://js.tappaysdk.com/sdk/tpdirect/v5.18.0"></script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans min-h-screen flex items-center justify-center">

<div class="max-w-lg w-full mx-auto px-6 py-16">
  <a href="/" class="inline-flex items-center gap-2 text-gray-400 hover:text-gray-600 text-sm mb-8 transition">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    返回課程頁
  </a>

  <!-- Plan Switcher -->
  <div class="grid grid-cols-2 gap-3 mb-6">
    <button id="btn-v1" onclick="switchPlan('v1')" class="plan-btn border-2 rounded-2xl p-4 text-left transition relative">
      <div class="text-xs font-bold text-gray-400 tracking-wider mb-1">BUILDER</div>
      <div class="font-black text-gray-900 text-lg">AI 造局術 Builder</div>
      <div class="text-sm text-gray-500 mt-1">完整 7 階段 + 自動化系統部署</div>
      <div class="text-sm font-bold text-green-600 mt-1">30 天內讓你的系統跑起來</div>
      <div class="mt-2"><span class="text-gray-400 line-through text-sm">$128,800</span></div>
      <div class="text-2xl font-black">$<span id="price-v1">{{priceV1}}</span> <span class="text-sm font-normal text-gray-400">一次性</span></div>
      <div class="mt-1"><span class="bg-yellow-100 text-yellow-700 text-xs font-bold px-2 py-0.5 rounded-full">早鳥優惠 省 $59,000</span></div>
      <ul class="mt-3 space-y-1.5 text-xs text-gray-500">
        <li class="flex items-center gap-1.5"><svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>63 堂實戰影片課程</li>
        <li class="flex items-center gap-1.5"><svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>Zeabur 模板一鍵部署</li>
        <li class="flex items-center gap-1.5"><svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>LP + LINE Bot + 金流 + 課程平台</li>
        <li class="flex items-center gap-1.5"><svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>3 波自動追單再行銷</li>
        <li class="flex items-center gap-1.5"><svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>Meta 廣告策略教學</li>
      </ul>
    </button>
    <button id="btn-v2" onclick="switchPlan('v2')" class="plan-btn border-2 rounded-2xl p-4 text-left transition relative overflow-hidden">
      <div class="absolute top-2 right-2 bg-gradient-to-r from-purple-500 to-purple-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">推薦</div>
      <div class="text-xs font-bold text-purple-500 tracking-wider mb-1">PARTNER</div>
      <div class="font-black text-gray-900 text-lg">AI 造局術 Partner</div>
      <div class="text-sm text-gray-500 mt-1">Builder 全部 + 全自動化進階模組</div>
      <div class="text-sm font-bold text-green-600 mt-1">30 天後你只負責直播，其他全自動</div>
      <div class="mt-2"><span class="text-gray-400 line-through text-sm">$160,000</span></div>
      <div class="text-2xl font-black">$<span id="price-v2">{{priceV2}}</span> <span class="text-sm font-normal text-gray-400">一次性</span></div>
      <div class="mt-1"><span class="bg-yellow-100 text-yellow-700 text-xs font-bold px-2 py-0.5 rounded-full">早鳥優惠 省 $60,200</span></div>
      <ul class="mt-3 space-y-1.5 text-xs text-gray-500">
        <li class="flex items-center gap-1.5"><svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>Builder 全部內容</li>
        <li class="flex items-center gap-1.5"><svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>短影音自動化（IG + FB + YT 每天發）</li>
        <li class="flex items-center gap-1.5"><svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>AI 分身（24 小時自動回覆）</li>
        <li class="flex items-center gap-1.5"><svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>6 波完整再行銷</li>
        <li class="flex items-center gap-1.5"><svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>廣告素材 AI 批量生產</li>
        <li class="flex items-center gap-1.5"><svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>漏斗 Dashboard 數據分析</li>
      </ul>
    </button>
  </div>

  <!-- Order summary -->
  <div class="bg-white border border-gray-200 rounded-2xl p-6 mb-6 shadow-sm">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center text-white font-black text-sm shadow-lg shadow-purple-500/20">K</div>
      <div>
        <div class="font-bold text-gray-900" id="order-title">{{courseTitle}}</div>
        <div class="text-gray-400 text-sm" id="order-plan">Builder</div>
      </div>
    </div>
    <hr class="border-gray-100 mb-4">
    <div class="flex justify-between items-center">
      <span class="text-gray-500">課程費用</span>
      <span class="text-3xl font-black text-gray-900">NT$ <span id="order-price">{{price}}</span></span>
    </div>
  </div>

  <!-- Form -->
  <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
    <h2 class="font-bold text-gray-900 text-lg mb-6">填寫報名資料</h2>

    <form id="checkoutForm" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-600 font-medium mb-1.5">姓名</label>
        <input type="text" name="name" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 focus:outline-none transition" placeholder="你的姓名">
      </div>
      <div>
        <label class="block text-sm text-gray-600 font-medium mb-1.5">Email</label>
        <input type="email" name="email" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 focus:outline-none transition" placeholder="your@email.com">
      </div>
      <div>
        <label class="block text-sm text-gray-600 font-medium mb-1.5">手機</label>
        <input type="tel" name="phone" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 focus:outline-none transition" placeholder="0912345678">
      </div>

      <!-- TapPay 信用卡輸入區 -->
      <div>
        <label class="block text-sm text-gray-600 font-medium mb-3">信用卡資訊</label>
        <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 space-y-3">
          <div>
            <label class="block text-xs text-gray-400 mb-1">卡號</label>
            <div id="card-number" class="h-10"></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-gray-400 mb-1">到期日</label>
              <div id="card-expiration-date" class="h-10"></div>
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1">安全碼</label>
              <div id="card-ccv" class="h-10"></div>
            </div>
          </div>
        </div>
        <div id="card-error" class="text-red-500 text-xs mt-2 hidden"></div>
      </div>

      <button type="submit" id="submitBtn" disabled class="w-full bg-gradient-to-r from-brand-500 to-purple-600 hover:from-brand-600 hover:to-purple-700 disabled:opacity-40 disabled:cursor-not-allowed text-white font-bold py-4 rounded-xl text-lg transition shadow-lg shadow-purple-500/25 mt-2">
        確認付款 NT$ <span id="btn-price">{{price}}</span>
      </button>
      <p class="text-center text-gray-400 text-xs mt-3">
        <svg class="inline w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        付款由 TapPay 安全處理，卡號不經過本站
      </p>
    </form>
  </div>
</div>

<script>
var currentPlan = '{{plan}}';
var prices = { v1: {{priceV1}}, v2: {{priceV2}} };
var labels = { v1: 'Builder', v2: 'Partner' };

function switchPlan(plan) {
  currentPlan = plan;
  var price = prices[plan].toLocaleString();

  // Update UI
  document.getElementById('order-price').textContent = price;
  document.getElementById('btn-price').textContent = price;
  document.getElementById('order-plan').textContent = labels[plan];

  // Update button styles
  document.getElementById('btn-v1').className = plan === 'v1'
    ? 'plan-btn border-2 border-brand-500 bg-blue-50 rounded-2xl p-4 text-left transition relative ring-2 ring-brand-500/20'
    : 'plan-btn border-2 border-gray-200 rounded-2xl p-4 text-left transition relative hover:border-gray-300';
  document.getElementById('btn-v2').className = plan === 'v2'
    ? 'plan-btn border-2 border-purple-500 bg-purple-50 rounded-2xl p-4 text-left transition relative overflow-hidden ring-2 ring-purple-500/20'
    : 'plan-btn border-2 border-gray-200 rounded-2xl p-4 text-left transition relative overflow-hidden hover:border-gray-300';

  // Update URL without reload
  var url = new URL(window.location);
  url.searchParams.set('plan', plan);
  history.replaceState(null, '', url);
}

// Init
switchPlan(currentPlan);

// TapPay SDK
TPDirect.setupSDK({{tappayAppId}}, '{{tappayAppKey}}', '{{tappayEnv}}');

TPDirect.card.setup({
  fields: {
    number: { element: '#card-number', placeholder: '**** **** **** ****' },
    expirationDate: { element: '#card-expiration-date', placeholder: 'MM / YY' },
    ccv: { element: '#card-ccv', placeholder: 'CVV' }
  },
  styles: {
    'input': { 'color': '#1a1a1a', 'font-size': '16px', 'font-family': 'Noto Sans TC, sans-serif' },
    ':focus': { 'color': '#1a1a1a' },
    '.valid': { 'color': '#16a34a' },
    '.invalid': { 'color': '#dc2626' }
  },
  isMaskCreditCardNumber: true
});

var canPay = false;
TPDirect.card.onUpdate(function(update) {
  var btn = document.getElementById('submitBtn');
  var err = document.getElementById('card-error');
  canPay = update.canGetPrime;
  btn.disabled = !canPay;
  if (update.status.number === 2 || update.status.expiry === 2 || update.status.ccv === 2) {
    err.textContent = '請檢查信用卡資訊';
    err.classList.remove('hidden');
  } else {
    err.classList.add('hidden');
  }
});

document.getElementById('checkoutForm').addEventListener('submit', function(e) {
  e.preventDefault();
  if (!canPay) return;

  var btn = document.getElementById('submitBtn');
  btn.textContent = '處理中...';
  btn.disabled = true;

  var formData = new FormData(e.target);
  var data = Object.fromEntries(formData);

  TPDirect.card.getPrime(function(result) {
    if (result.status !== 0) {
      alert('信用卡驗證失敗：' + result.msg);
      btn.innerHTML = '確認付款 NT$ <span id="btn-price">' + prices[currentPlan].toLocaleString() + '</span>';
      btn.disabled = false;
      return;
    }

    fetch('/api/pay', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prime: result.card.prime,
        name: data.name,
        email: data.email,
        phone: data.phone,
        plan: currentPlan
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.success && res.requires3DS) {
        // 3D Secure — 跳轉到銀行驗證頁
        window.location.href = res.redirectUrl;
        return;
      } else if (res.success) {
        window.location.href = res.redirectUrl;
      } else {
        alert(res.message || '付款失敗，請重試');
        btn.innerHTML = '確認付款 NT$ <span id="btn-price">' + prices[currentPlan].toLocaleString() + '</span>';
        btn.disabled = false;
      }
    })
    .catch(function() {
      alert('系統錯誤，請稍後再試');
      btn.innerHTML = '確認付款 NT$ <span id="btn-price">' + prices[currentPlan].toLocaleString() + '</span>';
      btn.disabled = false;
    });
  });
});
</script>
</body>
</html>
